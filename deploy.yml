name: Deploy Watchlist to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Inject secrets into HTML
        run: |
          sed \
            -e 's|__TMDB_KEY__|${{ secrets.TMDB_KEY }}|g' \
            -e 's|__GH_OWNER__|${{ secrets.GH_OWNER }}|g' \
            -e 's|__GH_REPO__|${{ secrets.GH_REPO }}|g'   \
            -e 's|__GH_TOKEN__|${{ secrets.GH_TOKEN }}|g'  \
            index.template.html > index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          # keep template and workflow out of the deployed branch
          exclude_assets: 'index.template.html,.github'
